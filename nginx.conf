server {
    listen 80;

    # Report PDF uploads pass through this proxy to report-service.
    client_max_body_size 25m;

    # --- API routing to backend services ---
    # report-service handles /api/v1/reports/...
    location ~ ^/api/v1/reports {
        proxy_pass         http://report-service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # appointment-service handles everything else under /api/v1/
    location /api/v1/ {
        proxy_pass         http://appointment-service;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Direct health check pass-throughs
    location /health/appointment {
        proxy_pass http://appointment-service/healthz;
    }
    location /health/report {
        proxy_pass http://report-service/healthz;
    }
    location /health/notification {
        proxy_pass http://notification-service/healthz;
    }

    # --- Static frontend (SPA) ---
    root /tmp/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
