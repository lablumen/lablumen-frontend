name: ci

# PR -> build the Vite SPA (catch breakages). Merge to main -> deploy via the reusable workflow
# (SSM discovery -> vite build -> s3 sync -> CloudFront invalidation). NOTE: the deploy needs CloudFront
# enabled (enable_cloudfront=true in terraform); until then the deploy step's invalidation will fail.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run build

  deploy:
    if: ${{ github.event_name == 'push' }}
    uses: lablumen/lablumen-shared/.github/workflows/frontend-deploy.yml@main
    with:
      service-path: .
      role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-frontend-deploy
