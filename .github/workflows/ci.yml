name: ci

# PR     → service-pr.yml  (Node runtime: build + SonarCloud + Snyk + Trivy)
# main   → service-build-push.yml  (ECR push + GitOps write-back to values-dev.yaml)
# release → service-release.yml   (retag SHA→semver + write-back to values-prod.yaml)
on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  pr:
    if: github.event_name == 'pull_request'
    uses: lablumen/lablumen-shared/.github/workflows/service-pr.yml@main
    with:
      service-name: frontend
      service-path: .
      runtime: node
      sonar-organization: ${{ vars.SONAR_ORGANIZATION }}
      sonar-sources: src
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  build:
    if: github.event_name == 'push'
    uses: lablumen/lablumen-shared/.github/workflows/service-build-push.yml@main
    with:
      service-name: frontend
      service-path: .
      ecr-repository: lablumen/frontend
      role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-frontend-build
    secrets:
      K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}

  release:
    if: github.event_name == 'release'
    uses: lablumen/lablumen-shared/.github/workflows/service-release.yml@main
    with:
      service-name: frontend
      ecr-repository: lablumen/frontend
      role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/lablumen-frontend-build
      release-tag: ${{ github.event.release.tag_name }}
    secrets:
      K8S_REPO_PAT: ${{ secrets.K8S_REPO_PAT }}
